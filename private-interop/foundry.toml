[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules", "vendor"]
cache_path = "cache-forge"
solc_version = "0.8.28"
evm_version = "prague"
ignored_error_codes = ["missing-receive-ether", "code-size"]
ignored_warnings_from = ["contracts/dev-contracts"]
suppressed_warnings = ["txorigin"]
optimizer = true
optimizer_runs = 9999999
allow_internal_expect_revert = true
remappings = [
  "contracts/=contracts/",
  "system-contracts/=vendor/system-contracts/",
  "@openzeppelin/contracts-v4/=node_modules/@openzeppelin/contracts-v4/",
  "@openzeppelin/contracts-upgradeable-v4/=node_modules/@openzeppelin/contracts-upgradeable-v4/"
]

[profile.anvil-interop]
cbor_metadata = false
bytecode_hash = "none"
