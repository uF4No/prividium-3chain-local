# Starts L1 (Anvil), 3 L2s (ZKsync OS), and 3 Prividium instances.
# Run from this repo root: docker compose -f ./docker-compose.yml up

name: zksync-prividium-3chains

# ═══════════════════════════════════════════════════════════════
# Shared environment variables for setup/init containers
# ═══════════════════════════════════════════════════════════════
x-setup-env: &setup-env # Deployer (Anvil default account #0)
  DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
  DEPLOYER_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
  # Demo User 1
  USER1_ADDRESS: "0xAD350E768913dAc29b8113C571fB3321c9d01495"
  # Demo User 2
  USER2_ADDRESS: "0xcFB389324aCf2e0Aad3aC5073166fe428f57fA89"
  # Interop relay signer address (matches interop-relay RELAY_PRIVATE_KEY)
  RELAY_ADDRESS: "0x36615Cf349d7F6344891B1e7CA7C72883F5dc049"
  # Contract Addresses
  REPO_CONTRACT_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
  USDC_ADDRESS: "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512"
  TUST_ADDRESS: "0x9fE46736679d2D9a65F0992F2272dE9f3c7fa6e0"
  SGD_ADDRESS: "0xCf7Ed3AccA5a467e9e704C703E8D87F634fB0Fc9"
  # Mint Amounts (USDC: 6 decimals → 10,000 USDC; TUST/SGD: 18 decimals → 100 tokens)
  USDC_MINT_AMOUNT: "10000000000"
  TUST_MINT_AMOUNT: "100000000000000000000"
  SGD_MINT_AMOUNT: "100000000000000000000"
  # Deposit Amount per user per chain (1000 ETH in wei)
  DEPOSIT_AMOUNT: "1000000000000000000000"
  # Relay only needs gas on destination chain.
  RELAY_DEPOSIT_AMOUNT: "1000000000000000000"

x-zksync-os-server: &zksync-os-server
  image: ghcr.io/matter-labs/zksync-os-server:test-only-interop-demo@sha256:cc9d5d6f792e97ca6d86d908a9d19411d70e62a8d08cf82ed2acfb5c45216c95
  platform: linux/amd64
  restart: unless-stopped
  extra_hosts:
    - host.docker.internal:host-gateway
  volumes:
    - ./local-chains:/app/local-chains
    - ./chain-configs:/app/chain-configs:ro
  tmpfs:
    - /app/db:mode=1777
  depends_on:
    anvil:
      condition: service_healthy

x-admin-panel: &admin-panel
  image: quay.io/matterlabs_enterprise/prividium-adminv2@sha256:5f4296b58c029f6a5b28d92d9f29355bc4cff9ee585757776b71d0e6ff0f6899
  platform: linux/amd64
  restart: unless-stopped
  environment: &admin-panel-env
    PORT: 3000
  depends_on:
    - permissions-api
    - user-panel

x-permissions-api: &permissions-api
  image: quay.io/matterlabs_enterprise/prividium-permissions-api@sha256:153f9103ccfc1f712b4322c465c61dd4f900e5987420cc28082ec445fef01b6b
  platform: linux/amd64
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    wait-for-chains:
      condition: service_completed_successfully
  environment: &permissions-api-env
    PORT: 8000
    METRICS_PORT: 9091
    WALLETS_API_ENABLED: "true"
    AUTH_METHODS: oidc,crypto_native
    NODE_ENV: production
    OIDC_JWKS_URI: http://keycloak:8080/realms/prividium/protocol/openid-connect/certs
    OIDC_JWT_AUD: prividium-client
    OIDC_JWT_ISSUER: http://localhost:5080/realms/prividium
    OIDC_ADMIN_SUBS: 00000000-0000-0000-0000-000000000001
    CORS_CACHE_DURATION_MS: 600000
    USER_SESSION_DURATION_SECONDS: 86400 # 24 hours

x-user-panel: &user-panel
  image: quay.io/matterlabs_enterprise/prividium-user-panel@sha256:8456cdf3585878a21ff00ea9fbc44132c9c1528014e7d41a11ac0c78a4a8cdc5
  platform: linux/amd64
  restart: unless-stopped
  environment: &user-panel-env
    VITE_OIDC_AUTHORITY: http://localhost:5080/realms/prividium
    VITE_OIDC_CLIENT_ID: prividium-client
    VITE_OIDC_BUTTON_TEXT: Sign in with Keycloak
    VITE_AUTH_METHODS: oidc,crypto_native
    VITE_WALLETS_ENABLED: "true"
    PORT: 3000
    VITE_BRIDGING_ENABLED: "true"
    VITE_L1_RPC_URL: http://localhost:8545
    VITE_L1_CHAIN_ID: 31337
    VITE_L1_CHAIN_NAME: Anvil Localhost
  depends_on:
    - permissions-api

x-block-explorer-api: &block-explorer-api
  image: ghcr.io/matter-labs/block-explorer-api@sha256:6f6ed4d80280af84f8304ce6772c24faa6a9666622007ebc22ab1612128e257f
  platform: linux/amd64
  extra_hosts:
    - host.docker.internal:host-gateway
  environment: &block-explorer-api-env
    LOG_LEVEL: verbose
    NODE_ENV: development
    DATABASE_HOST: postgres
    DATABASE_USER: postgres
    DATABASE_PASSWORD: postgres
    DATABASE_ENABLE_SSL: "false"
    NETWORK_NAME: testnet
    PRIVIDIUM: "true"
    PRIVIDIUM_APP_URL: http://localhost:3010
    PRIVIDIUM_SESSION_SECRET: QkxPQ0tfRVhQTE9SRVJfU0VTU0lPTl9TRUNSRVQ=
    PRIVIDIUM_SESSION_MAX_AGE: 86400000
    PRIVIDIUM_SESSION_SAME_SITE: strict
    LIMITED_PAGINATION_MAX_ITEMS: "10000"
    API_LIMITED_PAGINATION_MAX_ITEMS: "1000"
    DISABLE_BFF_API_SCHEMA_DOCS: "true"
  depends_on:
    postgres:
      condition: service_healthy
    wait-for-chains:
      condition: service_completed_successfully

x-block-explorer-app: &block-explorer-app
  image: ghcr.io/matter-labs/block-explorer-app@sha256:1e123174ee30524825d19fdd0193dcee5f00a8868211482e2c04f79583381db9
  platform: linux/amd64
  environment: &block-explorer-app-env
    PORT: 3010
    VITE_APP_ENVIRONMENT: prividium
  depends_on:
    - block-explorer-api

x-block-explorer-worker: &block-explorer-worker
  image: ghcr.io/matter-labs/block-explorer-worker@sha256:11fa4c45ad3d7c7f7760e4625338eae6c3c6f6dc0e885344b05256de402f7742
  platform: linux/amd64
  extra_hosts:
    - host.docker.internal:host-gateway
  environment: &block-explorer-worker-env
    DATABASE_HOST: postgres
    DATABASE_USER: postgres
    DATABASE_PASSWORD: postgres
    DATABASE_ENABLE_SSL: "false"
    NETWORK_NAME: testnet
    PRIVIDIUM: "true"
    ENABLE_TOKEN_OFFCHAIN_DATA_SAVER: "true"
    BLOCKS_PROCESSING_BATCH_SIZE: "10"
    NUMBER_OF_BLOCKS_PER_DB_TRANSACTION: "10"
  depends_on:
    postgres:
      condition: service_healthy
    block-explorer-data-fetcher:
      condition: service_started
    wait-for-chains:
      condition: service_completed_successfully

x-block-explorer-data-fetcher: &block-explorer-data-fetcher
  image: ghcr.io/matter-labs/block-explorer-data-fetcher@sha256:a42753bde2444e9db04e142a78d5244bead5c7b070f19ed2cf096abdf6c26338
  platform: linux/amd64
  extra_hosts:
    - host.docker.internal:host-gateway
  depends_on:
    wait-for-chains:
      condition: service_completed_successfully
  environment: &block-explorer-data-fetcher-env
    NETWORK_NAME: testnet
    BLOCKCHAIN_RPC_URL: http://chain1:3050
    PRIVIDIUM: "true"
    PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api:8000/api

services:
  # ═══════════════════════════════════════════════════════════════
  # LAYER 1: L1 Chain (Anvil)
  # ═══════════════════════════════════════════════════════════════
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.3.4
    platform: linux/amd64
    environment:
      - DOCKER_DEFAULT_PLATFORM=linux/amd64
    container_name: zkos-anvil
    ports:
      - 8545:8545
    volumes:
      - ./local-chains:/app/local-chains
      - ./chain-configs:/app/chain-configs:ro
    entrypoint: []
    command:
      [
        "anvil",
        "--host",
        "0.0.0.0",
        "--load-state",
        "/app/chain-configs/zkos-l1-state-v31-3chains-fixed.json",
        "--port",
        "8545",
      ]
    healthcheck:
      test:
        ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 15s
      retries: 10
      start_period: 2s

  # ═══════════════════════════════════════════════════════════════
  # LAYER 2: L2 Chains (ZKsync OS)
  # ═══════════════════════════════════════════════════════════════
  chain1:
    <<: *zksync-os-server
    container_name: zkos-chain1
    ports:
      - 3050:3050
    command: --config ./chain-configs/chain1.json

  chain2:
    <<: *zksync-os-server
    container_name: zkos-chain2
    ports:
      - 3051:3051
    command: --config ./chain-configs/chain2.json

  chain3:
    <<: *zksync-os-server
    container_name: zkos-chain3
    ports:
      - 3052:3052
    command: --config ./chain-configs/chain3-fixed.json

  # Waits for all L2 chains to be responsive (setup-tools image has curl)
  wait-for-chains:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    command: >-
      bash -c "
      echo 'Waiting for chain1...' &&
      until curl -sf -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://chain1:3050 > /dev/null 2>&1; do sleep 2; done &&
      echo 'chain1 is ready!' &&
      echo 'Waiting for chain2...' &&
      until curl -sf -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://chain2:3051 > /dev/null 2>&1; do sleep 2; done &&
      echo 'chain2 is ready!' &&
      echo 'Waiting for chain3...' &&
      until curl -sf -X POST -H 'Content-Type: application/json' --data '{\"jsonrpc\":\"2.0\",\"method\":\"eth_blockNumber\",\"params\":[],\"id\":1}' http://chain3:3052 > /dev/null 2>&1; do sleep 2; done &&
      echo 'chain3 is ready!'
      "
    depends_on:
      chain1:
        condition: service_started
      chain2:
        condition: service_started
      chain3:
        condition: service_started
    restart: "no"

  bundler-l2a:
    image: quay.io/matterlabs_enterprise/prividium-bundler:v1.164.2
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - ./:/workspace/prividium-3chain-local:ro
    environment:
      BUNDLER_PORT: "4337"
      SEQUENCER_RPC_URL: http://chain1:3050
      BUNDLER_EXECUTOR_PRIVATE_KEYS: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BUNDLER_UTILITY_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BUNDLER_MIN_BALANCE: "0"
      BUNDLER_NETWORK_NAME: "local-chain-a"
      BUNDLER_LOG_LEVEL: "info"
    command:
      [
        "sh",
        "-lc",
        "eval \"$$(node /workspace/prividium-3chain-local/scripts/aa-runtime-config.cjs a /workspace/prividium-3chain-local/.runtime/aa-contracts.json)\" && exec /app/apps/bundler/node_modules/.bin/alto --entrypoints \"$$ENTRYPOINT\" --executor-private-keys \"$$BUNDLER_EXECUTOR_PRIVATE_KEYS\" --utility-private-key \"$$BUNDLER_UTILITY_PRIVATE_KEY\" --min-balance \"$$BUNDLER_MIN_BALANCE\" --rpc-url \"$$SEQUENCER_RPC_URL\" --port \"$$BUNDLER_PORT\" --network-name \"$$BUNDLER_NETWORK_NAME\" --log-level \"$$BUNDLER_LOG_LEVEL\" --min-entity-stake 0 --min-entity-unstake-delay 0 --safe-mode false --entrypoint-simulation-contract-v8 \"$$ENTRYPOINT_SIMULATION_CONTRACT_V8\" --pimlico-simulation-contract \"$$PIMLICO_SIMULATION_CONTRACT\" --deploy-simulations-contract false --legacy-transactions true",
      ]
    depends_on:
      aa-contracts-deploy:
        condition: service_completed_successfully

  bundler-l2b:
    image: quay.io/matterlabs_enterprise/prividium-bundler:v1.164.2
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - ./:/workspace/prividium-3chain-local:ro
    environment:
      BUNDLER_PORT: "4337"
      SEQUENCER_RPC_URL: http://chain2:3051
      BUNDLER_EXECUTOR_PRIVATE_KEYS: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BUNDLER_UTILITY_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      BUNDLER_MIN_BALANCE: "0"
      BUNDLER_NETWORK_NAME: "local-chain-b"
      BUNDLER_LOG_LEVEL: "info"
    command:
      [
        "sh",
        "-lc",
        "eval \"$$(node /workspace/prividium-3chain-local/scripts/aa-runtime-config.cjs b /workspace/prividium-3chain-local/.runtime/aa-contracts.json)\" && exec /app/apps/bundler/node_modules/.bin/alto --entrypoints \"$$ENTRYPOINT\" --executor-private-keys \"$$BUNDLER_EXECUTOR_PRIVATE_KEYS\" --utility-private-key \"$$BUNDLER_UTILITY_PRIVATE_KEY\" --min-balance \"$$BUNDLER_MIN_BALANCE\" --rpc-url \"$$SEQUENCER_RPC_URL\" --port \"$$BUNDLER_PORT\" --network-name \"$$BUNDLER_NETWORK_NAME\" --log-level \"$$BUNDLER_LOG_LEVEL\" --min-entity-stake 0 --min-entity-unstake-delay 0 --safe-mode false --entrypoint-simulation-contract-v8 \"$$ENTRYPOINT_SIMULATION_CONTRACT_V8\" --pimlico-simulation-contract \"$$PIMLICO_SIMULATION_CONTRACT\" --deploy-simulations-contract false --legacy-transactions true",
      ]
    depends_on:
      aa-contracts-deploy:
        condition: service_completed_successfully

  postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: |
      bash -c "
      cat > /docker-entrypoint-initdb.d/init.sql << 'EOF'
      -- Create databases for the prividium project
      CREATE DATABASE permissions_api_l2a;
      CREATE DATABASE permissions_api_l2b;
      CREATE DATABASE permissions_api_l2c;
      -- Create databases for block explorer
      CREATE DATABASE prividium_block_explorer_l2a;
      CREATE DATABASE prividium_block_explorer_l2b;
      CREATE DATABASE prividium_block_explorer_l2c;

      -- Databases created successfully
      EOF

      exec docker-entrypoint.sh postgres
      "

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    ports:
      - 5080:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_RELATIVE_PATH: /
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_URL: http://localhost:5080
      KC_HOSTNAME_ADMIN_URL: http://localhost:5080
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./dev/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  admin-panel-l2a:
    <<: *admin-panel
    container_name: prividium-admin-panel-l2a
    environment:
      <<: *admin-panel-env
      VITE_PRIVIDIUM_API_URL: http://localhost:8000
      VITE_USER_PANEL_URL: http://localhost:3001
      VITE_EXPLORER_URL: http://localhost:3010
    depends_on:
      - permissions-api-l2a
      - user-panel-l2a
    ports:
      - 3000:3000
    networks:
      default:
        aliases: [l2a-admin-panel]

  permissions-api-l2a:
    <<: *permissions-api
    container_name: prividium-permissions-api-l2a
    environment:
      <<: *permissions-api-env
      SEQUENCER_RPC_URL: http://chain1:3050
      BUNDLER_ENABLED: "true"
      BUNDLER_RPC_URL: http://bundler-l2a:4337
      DISPATCHER_SSO_IMPLEMENTATIONS: 0x998abeb3E57409262aE5b751f60747921B33613E
      DISPATCHER_SSO_BYTECODE_HASHES: 0x77a9210e5f94158c7e8f7e84e9601f427e8c1d5f09dfd434afd16314456b0a0f
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3004
      ADMIN_PANEL_REDIRECT_URLS: http://localhost:3000/callback
      BLOCK_EXPLORER_REDIRECT_URLS: http://localhost:3010/auth/callback
      SIWE_VALID_DOMAINS: localhost:3000,localhost:3001,localhost:3004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/permissions_api_l2a
      SIWE_CHAIN_ID: 6565

    ports:
      - 8000:8000
      - 9091:9091
    networks:
      default:
        aliases: [l2a-permissions-api]

  user-panel-l2a:
    <<: *user-panel
    container_name: prividium-user-panel-l2a
    environment:
      <<: *user-panel-env
      VITE_CHAIN_ID: 6565
      VITE_CHAIN_NAME: "Chain 1"
      VITE_OIDC_REDIRECT_URI: http://localhost:3001/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3001/login
      VITE_ADMIN_PANEL_REDIRECT_URI: http://localhost:3000/callback
      VITE_ADMIN_PANEL_URL: http://localhost:3000
      VITE_BLOCK_EXPLORER_REDIRECT_URI: http://localhost:3010/auth/callback
      VITE_PRIVIDIUM_API_URL: http://localhost:8000
      VITE_EXPLORER_URL: http://localhost:3010
    depends_on:
      - permissions-api-l2a
    ports:
      - 3001:3000
    networks:
      default:
        aliases: [l2a-user-panel]

  block-explorer-api-l2a:
    <<: *block-explorer-api
    container_name: prividium-block-explorer-api-l2a
    environment:
      <<: *block-explorer-api-env
      PRIVIDIUM_APP_URL: http://localhost:3010
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2a:8000
      DATABASE_NAME: prividium_block_explorer_l2a

    ports:
      - 3002:3000
    networks:
      default:
        aliases: [l2a-block-explorer-api]

  block-explorer-app-l2a:
    <<: *block-explorer-app
    container_name: prividium-block-explorer-app-l2a
    ports:
      - 3010:3010
    depends_on:
      - block-explorer-api-l2a
    volumes:
      - ./dev/block-explorer/block-explorer-config.js:/usr/share/nginx/html/config.js:ro
    networks:
      default:
        aliases: [l2a-block-explorer-app]

  block-explorer-worker-l2a:
    <<: *block-explorer-worker
    container_name: prividium-block-explorer-worker-l2a
    environment:
      <<: *block-explorer-worker-env
      BLOCKCHAIN_RPC_URL: http://chain1:3050
      DATA_FETCHER_URL: http://block-explorer-data-fetcher-l2a:3040
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2a:8000/api
      DATABASE_NAME: prividium_block_explorer_l2a
    depends_on:
      - postgres
      - block-explorer-data-fetcher-l2a
    networks:
      default:
        aliases: [l2a-block-explorer-worker]

  block-explorer-data-fetcher-l2a:
    <<: *block-explorer-data-fetcher
    container_name: prividium-block-explorer-data-fetcher-l2a
    environment:
      <<: *block-explorer-data-fetcher-env
      BLOCKCHAIN_RPC_URL: http://chain1:3050
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2a:8000/api
    ports:
      - 3040:3040
    networks:
      default:
        aliases: [l2a-block-explorer-data-fetcher]

  admin-panel-l2b:
    <<: *admin-panel
    container_name: prividium-admin-panel-l2b
    environment:
      <<: *admin-panel-env
      VITE_PRIVIDIUM_API_URL: http://localhost:8300
      VITE_USER_PANEL_URL: http://localhost:3301
      VITE_EXPLORER_URL: http://localhost:3310
    depends_on:
      - permissions-api-l2b
      - user-panel-l2b
    ports:
      - 3300:3000
    networks:
      default:
        aliases: [l2b-admin-panel]

  permissions-api-l2b:
    <<: *permissions-api
    container_name: prividium-permissions-api-l2b
    environment:
      <<: *permissions-api-env
      SEQUENCER_RPC_URL: http://chain2:3051
      BUNDLER_ENABLED: "true"
      BUNDLER_RPC_URL: http://bundler-l2b:4337
      DISPATCHER_SSO_IMPLEMENTATIONS: 0xc6e7DF5E7b4f2A278906862b61205850344D4e7d
      DISPATCHER_SSO_BYTECODE_HASHES: 0x0f2baad3a5ff170b1ab4b162870e58287ead31e59b833bef602249ffdc54ec17
      CORS_ORIGIN: http://localhost:3300,http://localhost:3301,http://localhost:3302,http://localhost:3004
      ADMIN_PANEL_REDIRECT_URLS: http://localhost:3300/callback
      BLOCK_EXPLORER_REDIRECT_URLS: http://localhost:3310/auth/callback
      SIWE_VALID_DOMAINS: localhost:3300,localhost:3301,localhost:3004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/permissions_api_l2b
      SIWE_CHAIN_ID: 6566

    ports:
      - 8300:8000
      - 9391:9091
    networks:
      default:
        aliases: [l2b-permissions-api]

  user-panel-l2b:
    <<: *user-panel
    container_name: prividium-user-panel-l2b
    environment:
      <<: *user-panel-env
      VITE_CHAIN_ID: 6566
      VITE_CHAIN_NAME: "Chain 2"
      VITE_OIDC_REDIRECT_URI: http://localhost:3301/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3301/login
      VITE_ADMIN_PANEL_REDIRECT_URI: http://localhost:3300/callback
      VITE_ADMIN_PANEL_URL: http://localhost:3300
      VITE_BLOCK_EXPLORER_REDIRECT_URI: http://localhost:3310/auth/callback
      VITE_PRIVIDIUM_API_URL: http://localhost:8300
      VITE_EXPLORER_URL: http://localhost:3310
    depends_on:
      - permissions-api-l2b
    ports:
      - 3301:3000
    networks:
      default:
        aliases: [l2b-user-panel]

  block-explorer-api-l2b:
    <<: *block-explorer-api
    container_name: prividium-block-explorer-api-l2b
    environment:
      <<: *block-explorer-api-env
      PRIVIDIUM_APP_URL: http://localhost:3310
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2b:8000
      DATABASE_NAME: prividium_block_explorer_l2b
    ports:
      - 3302:3000
    networks:
      default:
        aliases: [l2b-block-explorer-api]

  block-explorer-app-l2b:
    <<: *block-explorer-app
    container_name: prividium-block-explorer-app-l2b
    ports:
      - 3310:3010
    depends_on:
      - block-explorer-api-l2b
    volumes:
      - ./dev/block-explorer/block-explorer-config-b.js:/usr/share/nginx/html/config.js:ro
    networks:
      default:
        aliases: [l2b-block-explorer-app]

  block-explorer-worker-l2b:
    <<: *block-explorer-worker
    container_name: prividium-block-explorer-worker-l2b
    environment:
      <<: *block-explorer-worker-env
      BLOCKCHAIN_RPC_URL: http://chain2:3051
      DATA_FETCHER_URL: http://block-explorer-data-fetcher-l2b:3040
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2b:8000/api
      DATABASE_NAME: prividium_block_explorer_l2b
    depends_on:
      - postgres
      - block-explorer-data-fetcher-l2b
    networks:
      default:
        aliases: [l2b-block-explorer-worker]

  block-explorer-data-fetcher-l2b:
    <<: *block-explorer-data-fetcher
    container_name: prividium-block-explorer-data-fetcher-l2b
    environment:
      <<: *block-explorer-data-fetcher-env
      BLOCKCHAIN_RPC_URL: http://chain2:3051
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2b:8000/api
    ports:
      - 3340:3040
    networks:
      default:
        aliases: [l2b-block-explorer-data-fetcher]

  admin-panel-l2c:
    <<: *admin-panel
    container_name: prividium-admin-panel-l2c
    environment:
      <<: *admin-panel-env
      VITE_PRIVIDIUM_API_URL: http://localhost:8600
      VITE_USER_PANEL_URL: http://localhost:3601
      VITE_EXPLORER_URL: http://localhost:3610
    depends_on:
      - permissions-api-l2c
      - user-panel-l2c
    ports:
      - 3600:3000
    networks:
      default:
        aliases: [l2c-admin-panel]

  permissions-api-l2c:
    <<: *permissions-api
    container_name: prividium-permissions-api-l2c
    environment:
      <<: *permissions-api-env
      SEQUENCER_RPC_URL: http://chain3:3052
      CORS_ORIGIN: http://localhost:3600,http://localhost:3601,http://localhost:3602,http://localhost:3004
      ADMIN_PANEL_REDIRECT_URLS: http://localhost:3600/callback
      BLOCK_EXPLORER_REDIRECT_URLS: http://localhost:3610/auth/callback
      SIWE_VALID_DOMAINS: localhost:3600,localhost:3601,localhost:3004
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/permissions_api_l2c
      SIWE_CHAIN_ID: 6567
    ports:
      - 8600:8000
      - 9691:9091
    networks:
      default:
        aliases: [l2c-permissions-api]

  user-panel-l2c:
    <<: *user-panel
    container_name: prividium-user-panel-l2c
    environment:
      <<: *user-panel-env
      VITE_CHAIN_ID: 6567
      VITE_CHAIN_NAME: "Chain 3"
      VITE_OIDC_REDIRECT_URI: http://localhost:3601/callback
      VITE_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3601/login
      VITE_ADMIN_PANEL_REDIRECT_URI: http://localhost:3600/callback
      VITE_ADMIN_PANEL_URL: http://localhost:3600
      VITE_BLOCK_EXPLORER_REDIRECT_URI: http://localhost:3610/auth/callback
      VITE_PRIVIDIUM_API_URL: http://localhost:8600
      VITE_EXPLORER_URL: http://localhost:3610
    depends_on:
      - permissions-api-l2c
    ports:
      - 3601:3000
    networks:
      default:
        aliases: [l2c-user-panel]

  block-explorer-api-l2c:
    <<: *block-explorer-api
    container_name: prividium-block-explorer-api-l2c
    environment:
      <<: *block-explorer-api-env
      PRIVIDIUM_APP_URL: http://localhost:3610
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2c:8000
      DATABASE_NAME: prividium_block_explorer_l2c
    ports:
      - 3602:3000
    networks:
      default:
        aliases: [l2c-block-explorer-api]

  block-explorer-app-l2c:
    <<: *block-explorer-app
    container_name: prividium-block-explorer-app-l2c
    ports:
      - 3610:3010
    depends_on:
      - block-explorer-api-l2c
    volumes:
      - ./dev/block-explorer/block-explorer-config-c.js:/usr/share/nginx/html/config.js:ro
    networks:
      default:
        aliases: [l2c-block-explorer-app]

  block-explorer-worker-l2c:
    <<: *block-explorer-worker
    container_name: prividium-block-explorer-worker-l2c
    environment:
      <<: *block-explorer-worker-env
      BLOCKCHAIN_RPC_URL: http://chain3:3052
      DATA_FETCHER_URL: http://block-explorer-data-fetcher-l2c:3040
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2c:8000/api
      DATABASE_NAME: prividium_block_explorer_l2c
    depends_on:
      - postgres
      - block-explorer-data-fetcher-l2c
    networks:
      default:
        aliases: [l2c-block-explorer-worker]

  block-explorer-data-fetcher-l2c:
    <<: *block-explorer-data-fetcher
    container_name: prividium-block-explorer-data-fetcher-l2c
    environment:
      <<: *block-explorer-data-fetcher-env
      BLOCKCHAIN_RPC_URL: http://chain3:3052
      PRIVIDIUM_PERMISSIONS_API_URL: http://permissions-api-l2c:8000/api
    ports:
      - 3640:3040
    networks:
      default:
        aliases: [l2c-block-explorer-data-fetcher]

  # ═══════════════════════════════════════════════════════════════
  # INTEROP: Cross-chain message relay
  # ═══════════════════════════════════════════════════════════════
  interop-relay:
    image: ghcr.io/jackhamer09/cast-interop:latest
    platform: linux/amd64
    environment:
      RELAY_PRIVATE_KEY: "0x7726827caac94a7f9e1b160f7ea819f172f7b6f9d2a97f992c38edeab82d4110"
    entrypoint: ["/bin/sh", "-c"]
    command:
      [
        "cast-interop auto-relay --rpc http://chain1:3050 http://chain2:3051 http://chain3:3052 --private-key $$RELAY_PRIVATE_KEY",
      ]
    restart: unless-stopped
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully

  # ═══════════════════════════════════════════════════════════════
  # SETUP: One-shot init containers (run in order, then exit)
  # ═══════════════════════════════════════════════════════════════
  deposit:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    environment:
      <<: *setup-env
    command: >-
      bash -c "
      echo 'Depositing ETH for deployer on all chains...' &&
      ./scripts/deposit.sh $$DEPLOYER_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain1:3050 &&
      ./scripts/deposit.sh $$DEPLOYER_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain2:3051 &&
      ./scripts/deposit.sh $$DEPLOYER_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain3:3052 &&
      echo 'Depositing ETH for user1 on all chains...' &&
      ./scripts/deposit.sh $$USER1_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain1:3050 &&
      ./scripts/deposit.sh $$USER1_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain2:3051 &&
      ./scripts/deposit.sh $$USER1_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain3:3052 &&
      echo 'Depositing ETH for user2 on all chains...' &&
      ./scripts/deposit.sh $$USER2_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain1:3050 &&
      ./scripts/deposit.sh $$USER2_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain2:3051 &&
      ./scripts/deposit.sh $$USER2_ADDRESS $$DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain3:3052 &&
      echo 'Depositing ETH for interop relay on chain3...' &&
      ./scripts/deposit.sh $$RELAY_ADDRESS $$RELAY_DEPOSIT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://anvil:8545 http://chain3:3052
      "
    depends_on:
      wait-for-chains:
        condition: service_completed_successfully
    restart: "no"

  contracts-deploy:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    working_dir: /workspace/contracts
    environment:
      <<: *setup-env
    command: >-
      bash -c "
      export PRIVATE_KEY=$$DEPLOYER_PRIVATE_KEY &&
      cp -n .env.example .env 2>/dev/null || true &&
      echo 'Deploying contracts to chain1...' &&
      forge script script/Deploy.s.sol:DeployScript --rpc-url http://chain1:3050 --broadcast --legacy
      "
    depends_on:
      deposit:
        condition: service_completed_successfully
    restart: "no"

  aa-contracts-deploy:
    image: quay.io/matterlabs_enterprise/prividium-bundler:v1.164.2
    platform: linux/amd64
    entrypoint: ["node", "/workspace/prividium-3chain-local/scripts/deploy-aa-contracts.cjs"]
    volumes:
      - ./:/workspace/prividium-3chain-local
    environment:
      <<: *setup-env
      CHAIN_A_ID: "6565"
      CHAIN_A_RPC_URL: http://chain1:3050
      CHAIN_B_ID: "6566"
      CHAIN_B_RPC_URL: http://chain2:3051
      AA_CONTRACTS_OUTPUT_PATH: /workspace/prividium-3chain-local/.runtime/aa-contracts.json
    depends_on:
      deposit:
        condition: service_completed_successfully
    restart: "no"

  mint-tokens:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    environment:
      <<: *setup-env
    command: >-
      bash -c "
      set -e &&
      echo 'Minting tokens for user1...' &&
      ./scripts/mint.sh $$USER1_ADDRESS $$USDC_ADDRESS $$USDC_MINT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://chain1:3050 &&
      ./scripts/mint.sh $$USER1_ADDRESS $$TUST_ADDRESS $$TUST_MINT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://chain1:3050 &&
      ./scripts/mint.sh $$USER1_ADDRESS $$SGD_ADDRESS $$SGD_MINT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://chain1:3050 &&
      echo 'Minting tokens for deployer (will be bridged to user2 on Chain 2)...' &&
      ./scripts/mint.sh $$DEPLOYER_ADDRESS $$USDC_ADDRESS $$USDC_MINT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://chain1:3050 &&
      ./scripts/mint.sh $$DEPLOYER_ADDRESS $$TUST_ADDRESS $$TUST_MINT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://chain1:3050 &&
      ./scripts/mint.sh $$DEPLOYER_ADDRESS $$SGD_ADDRESS $$SGD_MINT_AMOUNT $$DEPLOYER_PRIVATE_KEY http://chain1:3050
      "
    depends_on:
      contracts-deploy:
        condition: service_completed_successfully
    restart: "no"

  bridge-tokens:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    working_dir: /workspace/scripts
    environment:
      <<: *setup-env
    command: >-
      bash -c "
      set -e &&
      echo 'Bridging USDC to chain2...' &&
      npm run bridge-token -- $$USDC_ADDRESS $$USDC_MINT_AMOUNT $$USER2_ADDRESS $$DEPLOYER_PRIVATE_KEY http://chain1:3050 http://chain2:3051 &&
      echo 'Bridging TUST to chain2...' &&
      npm run bridge-token -- $$TUST_ADDRESS $$TUST_MINT_AMOUNT $$USER2_ADDRESS $$DEPLOYER_PRIVATE_KEY http://chain1:3050 http://chain2:3051 &&
      echo 'Bridging SGD to chain2...' &&
      npm run bridge-token -- $$SGD_ADDRESS $$SGD_MINT_AMOUNT $$USER2_ADDRESS $$DEPLOYER_PRIVATE_KEY http://chain1:3050 http://chain2:3051
      "
    depends_on:
      mint-tokens:
        condition: service_completed_successfully
      interop-relay:
        condition: service_started
    restart: "no"

  prividium-seed:
    image: ghcr.io/jackhamer09/prividium-setup-tools:latest
    platform: linux/amd64
    volumes:
      - ./dev/seed-permissions-l2a.sql:/workspace/prividium-utils/dev/seed-permissions-l2a.sql:ro
      - ./dev/seed-permissions-l2b.sql:/workspace/prividium-utils/dev/seed-permissions-l2b.sql:ro
      - ./dev/seed-permissions-l2c.sql:/workspace/prividium-utils/dev/seed-permissions-l2c.sql:ro
    command: >-
      bash -c "
      echo 'Waiting for permissions API migrations to complete...' &&
      until PGPASSWORD=postgres psql -h postgres -U postgres -d permissions_api_l2a -c 'SELECT 1 FROM users LIMIT 1' > /dev/null 2>&1; do
        echo 'Waiting for permissions_api_l2a tables...'; sleep 3;
      done &&
      until PGPASSWORD=postgres psql -h postgres -U postgres -d permissions_api_l2b -c 'SELECT 1 FROM users LIMIT 1' > /dev/null 2>&1; do
        echo 'Waiting for permissions_api_l2b tables...'; sleep 3;
      done &&
      until PGPASSWORD=postgres psql -h postgres -U postgres -d permissions_api_l2c -c 'SELECT 1 FROM users LIMIT 1' > /dev/null 2>&1; do
        echo 'Waiting for permissions_api_l2c tables...'; sleep 3;
      done &&
      echo 'Tables ready, seeding...' &&
      PGPASSWORD=postgres psql -h postgres -U postgres -d permissions_api_l2a < /workspace/prividium-utils/dev/seed-permissions-l2a.sql &&
      PGPASSWORD=postgres psql -h postgres -U postgres -d permissions_api_l2b < /workspace/prividium-utils/dev/seed-permissions-l2b.sql &&
      PGPASSWORD=postgres psql -h postgres -U postgres -d permissions_api_l2c < /workspace/prividium-utils/dev/seed-permissions-l2c.sql
      "
    depends_on:
      permissions-api-l2a:
        condition: service_started
      permissions-api-l2b:
        condition: service_started
      permissions-api-l2c:
        condition: service_started
    restart: "no"

  # ═══════════════════════════════════════════════════════════════
  # APP: Demo frontend (production build)
  # ═══════════════════════════════════════════════════════════════
  demo-app:
    image: ghcr.io/jackhamer09/prividium-demo-app:latest
    platform: linux/amd64
    ports:
      - 3004:3004
    environment:
      NUXT_PUBLIC_INTRADAY_REPO_CONTRACT_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      NUXT_PUBLIC_MAIN_CHAIN_ID: 6565
      NUXT_PUBLIC_USDC_ASSET_ID: "0x8442d3800cd5cdec4c635bcbf29eca2a0d2912f96f2f2549fbd66d95e16b7036"
      NUXT_PUBLIC_TUST_ASSET_ID: "0x77baed655828a3026a312e17aab097575a2cb78962e977ff57a940df969fd88d"
      NUXT_PUBLIC_SGD_ASSET_ID: "0xb40c1d8f7cc6220ae72d6fc26ac5ac9267166abe7fce03ee92575a7b67d522a7"
      NUXT_PUBLIC_L1_CHAIN_ID: 31337
      NUXT_PUBLIC_L1_CHAIN_NAME: Local L1
      NUXT_PUBLIC_L1_RPC_URL: http://localhost:8545
      NUXT_PUBLIC_L1_BLOCK_EXPLORER_URL: http://localhost
      NUXT_PUBLIC_L1_BLOCK_EXPLORER_NAME: Block Explorer
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_ID: 6565
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_NAME: Chain 1
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_OAUTH_CLIENT_ID: IjRacE3lJ8vF85jJ
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_AUTH_BASE_URL: http://localhost:3001
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_PRIVIDIUM_API_BASE_URL: http://localhost:8000
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_BLOCK_EXPLORER_URL: http://localhost:3010
      NUXT_PUBLIC_PRIVIDIUM_CHAIN1_BLOCK_EXPLORER_NAME: Block Explorer 1
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_ID: 6566
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_NAME: Chain 2
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_OAUTH_CLIENT_ID: IjRacE3lJ8vF85jJ
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_AUTH_BASE_URL: http://localhost:3301
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_PRIVIDIUM_API_BASE_URL: http://localhost:8300
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_BLOCK_EXPLORER_URL: http://localhost:3310
      NUXT_PUBLIC_PRIVIDIUM_CHAIN2_BLOCK_EXPLORER_NAME: Block Explorer 2
    depends_on:
      bridge-tokens:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres:
